name: Lint
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  lint:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          # commitlint needs the full history to walk the commit range on PRs;
          # the default shallow clone (depth 1) would cause it to miss commits.
          fetch-depth: 0

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Run prettier
        run: npm run prettier

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
